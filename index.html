<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Concept A</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

background:#0f1117;
color:#f2f4ff;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.phone{

width:100%;
max-width:430px;
height:100vh;

background:#171b24;

display:flex;
flex-direction:column;

padding:30px;

}

.top{

opacity:.7;
font-size:14px;

}

h1{

margin-top:25px;
font-size:34px;

}

.subtitle{

margin-top:10px;
color:#9aa3c2;
font-size:18px;

}

.card{

margin-top:40px;

background:#22283a;

padding:24px;

border-radius:20px;

}

.question{

font-size:26px;
line-height:1.4;

}

.input{

margin-top:20px;

background:#0f1117;

padding:18px;

border-radius:14px;

color:#7b84a9;

}

button{

margin-top:20px;

width:100%;

padding:18px;

border:none;

border-radius:14px;

background:#4f8ef7;

color:white;

font-size:18px;

}

.feedback{

margin-top:35px;

background:#162233;

border-left:4px solid #2dd4a0;

padding:18px;

border-radius:14px;

}

.feedback h3{

margin-bottom:10px;

color:#2dd4a0;

}

.footer{

margin-top:auto;

display:flex;

justify-content:space-between;

color:#94a3b8;

font-size:13px;

}

</style>

</head>

<body>

<div class="phone">

<div class="top">

🌙 Luna Infinity

</div>

<h1>Good evening, Johanna.</h1>

<div class="subtitle">

Let's speak English for a few minutes.

</div>

<div class="card">

<div class="question">

What did you do today?

</div>

<div class="input">

I work and watch a series...

</div>

<button>

Send

</button>

</div>

<div class="feedback">

<h3>🌙 Luna</h3>

Nice!

One small correction.

<b>I worked and watched a series.</b>

<br><br>

What series did you watch?

</div>

<div class="footer">

<div>🔥 +10 XP</div>

<div>Past Simple ↑</div>

</div>

</div>

</body>
</html>
